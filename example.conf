server {
	listen 4242;
	server_name myserver.local;

	root www;
	index index.html;

	client_max_body_size 10Mb;

	error_page 404 /errors/404.html;
	error_page 500 /errors/500.html;

	# Default route
	location / {
		try_files $uri $uri/ =404;
	}

	# Static files (HTML, CSS, JS, images)
	location /static/ {
		root www/static;
		autoindex on;
	}

	# CGI for Python
	location /cgi-bin/ {
		root www/cgi-bin;
		cgi_extension .py;
		cgi_path /usr/bin/python3;
	}

	# CGI for PHP
	location /php/ {
		root www/php;
		cgi_extension .php;
		cgi_path /usr/bin/php-cgi;
	}

	# File upload example
	location /upload {
		allowed_methods POST;
		upload_store uploads;
	}

	# DELETE example
	location /delete {
		allowed_methods DELETE;
		root www/uploads;
	}
}

